<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DragonPony Schedule</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="shortcut icon" href="./icon.jpg" type="image/x-icon"> 
<link rel="apple-touch-icon" href="./icon.jpg">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DRAGON PONY SCHEDULE">

<style>
  /* [수정 1] body에서 전체 스크롤을 막고 검은 배경 깔기 */
  body { 
    font-family: 'Pretendard', sans-serif; 
    margin: 0; 
    background-color: #000; 
    height: 100vh; 
    overflow: hidden; 
  }

  /* [수정 2] app-wrap은 중앙 정렬 및 내부 콘텐츠만 스크롤 되도록 틀 고정 */
  .app-wrap { 
    max-width: 480px; 
    margin: 0 auto; 
    background: #121212; 
    color: #fff; 
    height: 100%; 
    position: relative; 
    overflow: hidden; 
    box-shadow: 0 0 15px rgba(0,0,0,0.5); 
    display: flex; 
    flex-direction: column; 
  }
  
  .header { background: #0a0a0a; color: #fff; padding: 25px 20px; text-align: center; position: relative; flex-shrink: 0; border-bottom: 1px solid #222; }
  .main-title { display: block; font-family: 'Bebas Neue', sans-serif; font-weight: 400; font-size: 2.0rem; letter-spacing: 3px; margin-bottom: 2px; color: #fff; text-shadow: 0 0 10px rgba(204, 0, 51, 0.4); }
  .sub-title-link { font-size: 0.85rem; font-weight: 300; color: #888; text-decoration: none; letter-spacing: 0.5px; transition: 0.3s; display: inline-block; }
  .tab-wrap { display: flex; border-bottom: 1px solid #222; flex-shrink: 0; background: #121212; }
  .tab-btn { flex: 1; padding: 15px 0; border: none; background: none; font-size: 1rem; font-weight: bold; color: #555; cursor: pointer; transition: 0.2s; }
  .tab-btn.active { color: #fff; border-bottom: 3px solid #cc0033; }
  
  /* [수정 3] height: 0; 을 줘서 Flexbox 안에서 스크롤이 완벽하게 작동하도록 수정 */
  .view-content { flex-grow: 1; height: 0; overflow-y: auto; overflow-x: hidden; display: none; background: #121212; padding-bottom: 120px; }
  .view-content.active { display: block; }
  .list-page { padding: 10px 20px; }
  
  /* [추가] PC 환경 스크롤바 디자인 (이걸 넣어야 윈도우 PC에서도 예쁜 스크롤바가 생깁니다) */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background-color: #444; border-radius: 10px; }
  ::-webkit-scrollbar-track { background-color: #121212; }
  
  .filter-notice { text-align: center; padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; color: #bbb; border: 1px dashed #444; }
  .schedule-item { display: flex; align-items: center; padding: 20px 10px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.3s; }
  .date { font-weight: bold; color: #cc0033; width: 65px; font-size: 1.1rem; flex-shrink: 0; }
  .category-badge { display: inline-block; padding: 3px 6px; margin-right: 12px; font-size: 0.7rem; font-weight: 700; color: #cc0033; border: 1px solid #cc0033; border-radius: 4px; white-space: nowrap; text-align: center; min-width: 32px; flex-shrink: 0; cursor: pointer; }
  .category-badge.active { background: #cc0033; color: #fff; }
  .title { font-size: 1.1rem; font-weight: 500; color: #eee; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .check-btn { width: 22px; height: 22px; border: 2px solid #444; border-radius: 50%; margin-left: 10px; flex-shrink: 0; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; cursor: pointer; z-index: 5; }
  .check-btn.checked { background: #cc0033; border-color: #cc0033; color: #fff; }
  .check-btn.checked::after { content: '✓'; }

  .past-schedules { margin-top: 20px; border-top: 2px dashed #333; padding-top: 15px; }
  .past-schedules summary { cursor: pointer; font-size: 0.95rem; color: #888; font-weight: bold; list-style: none; text-align: center; padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; }
  .past-schedules .schedule-item { opacity: 0.5; } 
  .past-schedules .date, .past-schedules .category-badge { color: #666 !important; border-color: #666 !important; } 

  .data-mgmt { margin: 40px 10px 100px 10px; padding: 20px; border: 1px solid #222; border-radius: 12px; background: #0a0a0a; text-align: center; }
  .data-mgmt-title { font-size: 0.85rem; color: #555; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; }
  .data-btn-wrap { display: flex; gap: 10px; }
  .data-btn { flex: 1; padding: 10px; font-size: 0.8rem; background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 6px; cursor: pointer; transition: 0.2s; }
  .data-btn:active { background: #222; color: #fff; }

  .calendar-wrap { padding: 15px; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; font-size: 1.2rem; color: #eee; }
  .cal-nav { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #666; transition: 0.2s; padding: 5px 10px; }
  .cal-nav:hover { color: #fff; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; text-align: center; }
  .cal-day-name { font-size: 0.8rem; color: #666; margin-bottom: 5px; }
  .cal-day { min-height: 70px; border: 1px solid #222; border-radius: 5px; padding: 4px 2px; font-size: 0.9rem; color: #ccc; display: flex; flex-direction: column; align-items: center; overflow: hidden; position: relative; }
  .cal-day.today { border: 2px solid #cc0033; background: rgba(204, 0, 51, 0.1); box-shadow: inset 0 0 10px rgba(204, 0, 51, 0.3); }
  .today-label { font-size: 0.55rem; font-weight: bold; color: #cc0033; margin-top: 1px; margin-bottom: 2px; display: block; }
  .cal-event { margin-top: auto; color: #fff; font-size: 0.65rem; padding: 4px 2px; border-radius: 4px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }

  .footer { padding: 15px; text-align: center; background: #121212; border-top: 1px solid #222; flex-shrink: 0; }
  .insta-footer-link { font-size: 0.85rem; font-weight: 300; color: #777; text-decoration: none; }
  
  .detail-page { display: none; background: #121212; position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box; overflow-y: auto; overflow-x: hidden; z-index: 10; color: #fff; }
  .floating-back-btn { position: fixed; top: 20px; left: 50%; margin-left: -225px; /* 480px의 절반 위치에서 여백 */ width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-size: 1rem; z-index: 100; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  /* 모바일 화면일 때 뒤로가기 버튼 위치 조정 */
  @media (max-width: 480px) {
    .floating-back-btn { left: 15px; margin-left: 0; }
  }

  .hero-section { position: relative; width: 100%; min-height: 350px; background: #1a1a1a; }
  .d-image img { width: 100%; display: block; object-fit: cover; min-height: 350px; }
  .hero-gradient { position: absolute; bottom: 0; left: 0; width: 100%; height: 250px; background: linear-gradient(to top, #121212 5%, transparent); z-index: 1; }
  .hero-title-area { position: absolute; bottom: 30px; left: 20px; right: 20px; z-index: 2; }
  .d-date { color: #cc0033; font-weight: 900; font-size: 1.4rem; margin-bottom: 5px; }
  .d-title { font-size: 2.2rem; font-weight: 900; line-height: 1.2; }
  
  .ticket-section { padding: 20px; padding-bottom: 120px; z-index: 2; position: relative; display: flex; flex-direction: column; align-items: center; }
  .ticket-wrapper { background: #1a1a1a; border: 2px dashed #444; border-radius: 12px; padding: 35px 20px 25px 20px; position: relative; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
  .ticket-label { position: absolute; top: -14px; left: 20px; background: #cc0033; color: #fff; font-size: 0.8rem; font-weight: 900; padding: 6px 15px; border-radius: 4px; }
  .d-text { font-size: 1.05rem; line-height: 1.8; color: #ddd; white-space: pre-line; }
  .d-text a { color: #ff4d79; font-weight: bold; text-decoration: underline; }
  .add-cal-btn { display: block; width: 100%; box-sizing: border-box; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #eee; border-radius: 8px; font-weight: bold; text-align: center; cursor: pointer; text-decoration: none; font-size: 0.95rem; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="app-wrap">
  <div id="main-view" style="display: flex; flex-direction: column; height: 100%;">
    <div class="header">
      <span class="main-title">DRAGON PONY SCHEDULE</span>
      <a href="https://www.instagram.com/dragonpony_/" target="_blank" class="sub-title-link">@dragonpony_</a>
    </div>

    <div class="tab-wrap">
      <button class="tab-btn active" id="btn-calendar" onclick="switchTab('calendar')">월간 스케줄</button>
      <button class="tab-btn" id="btn-list" onclick="switchTab('list')">목록 보기</button>
    </div>

    <div id="calendar-view" class="view-content active">
      <div class="calendar-wrap">
        <div class="cal-header">
          <button class="cal-nav" onclick="prevMonth()">◀</button>
          <span id="cal-title"></span>
          <button class="cal-nav" onclick="nextMonth()">▶</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <div id="list-view" class="view-content">
      <div id="schedule-list" class="list-page"></div>
      <div class="data-mgmt">
        <div class="data-mgmt-title">CHECK DATA BACKUP</div>
        <div class="data-btn-wrap">
          <button class="data-btn" onclick="exportData()">기록 내보내기</button>
          <button class="data-btn" onclick="importData()">기록 가져오기</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <a href="https://x.com/dragonponysuzip/" target="_blank" class="insta-footer-link">@dragonponysuzip</a>
    </div>
  </div>

  <div class="detail-page" id="detail-view">
    <button class="floating-back-btn" onclick="closeDetail()">◀</button>
    <div class="hero-section">
      <div class="d-image" id="view-image"></div>
      <div class="hero-gradient"></div>
      <div class="hero-title-area">
        <div class="d-date" id="view-date"></div>
        <div class="d-title" id="view-title"></div>
      </div>
    </div>
    <div class="ticket-section">
      <div class="ticket-wrapper">
        <div class="ticket-label">INFO</div>
        <div id="view-text" class="d-text"></div>
      </div>
      <div id="add-to-cal-btn-area" style="width: 100%;"></div>
    </div>
  </div>
</div>

<script>
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth() + 1;
  let scheduleData = []; 
  let currentFilter = ''; 

  function getAttendance() {
    const saved = localStorage.getItem('dp_attendance');
    return saved ? JSON.parse(saved) : {};
  }

  function toggleAttendance(title, event) {
    event.stopPropagation();
    const listView = document.getElementById('list-view');
    const currentScroll = listView.scrollTop;
    const pastDetails = document.querySelector('.past-schedules');
    const wasOpen = pastDetails ? pastDetails.hasAttribute('open') : false;

    let attendance = getAttendance();
    attendance[title] = !attendance[title];
    localStorage.setItem('dp_attendance', JSON.stringify(attendance));
    
    renderList(); 
    if (wasOpen) {
      const newPastDetails = document.querySelector('.past-schedules');
      if (newPastDetails) newPastDetails.setAttribute('open', '');
    }
    listView.scrollTop = currentScroll;
  }

  function exportData() {
    const data = localStorage.getItem('dp_attendance');
    if (!data || data === '{}') return alert("내보낼 기록이 없세혁!");
    const encodedData = btoa(encodeURIComponent(data));
    navigator.clipboard.writeText(encodedData).then(() => {
      alert("체크 기록이 복사되었어요!\n메모장이나 카톡에 붙여넣어 보관하세혁♡,,♡");
    });
  }

  function importData() {
    const code = prompt("복사해둔 백업 코드를 입력해주세혁:");
    if (!code) return;
    try {
      const decodedData = decodeURIComponent(atob(code));
      JSON.parse(decodedData);
      localStorage.setItem('dp_attendance', decodedData);
      alert("기록 복구 성공! 🎸");
      location.reload();
    } catch (e) {
      alert("잘못된 코드인 것 같아요. 다시 확인해주세혁ㅠ..ㅠ!");
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn, .view-content').forEach(el => el.classList.remove('active'));
    document.getElementById(`btn-${tab}`).classList.add('active');
    document.getElementById(`${tab}-view`).classList.add('active');
  }

  async function fetchSchedules() {
    const sheetId = '1UKMplA90Fz4x3ueJtjRSOGOK1bD1c74GkK-wo573dG4';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
    try {
      const response = await fetch(url);
      const text = await response.text();
      const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
      const data = JSON.parse(jsonStr);
      scheduleData = []; 
      data.table.rows.forEach(row => {
        if (!row.c || !row.c[0]) return;
        const dateStr = row.c[0].v;
        const titleStr = row.c[1] ? row.c[1].v : '';
        const imgUrl = row.c[2] ? row.c[2].v : '';
        const descStr = row.c[3] ? row.c[3].v : '';
        const typeStr = (row.c.length > 4 && row.c[4]) ? row.c[4].v : ''; 
        if(dateStr === '날짜') return;
        scheduleData.push({ dateStr, titleStr, imgUrl, descStr, typeStr });
      });
      renderList(); 
    } catch (e) {
      document.getElementById('schedule-list').innerHTML = '<div style="text-align:center; padding: 50px;">불러오기 실패</div>';
    }
  }

  function renderList() {
    const listContainer = document.getElementById('schedule-list');
    listContainer.innerHTML = '';
    const attendance = getAttendance();
    
    if(currentFilter) {
      const noticeDiv = document.createElement('div');
      noticeDiv.className = 'filter-notice';
      noticeDiv.innerHTML = `<span style="color: #cc0033; font-weight: bold;">[${currentFilter}]</span> 스케줄만 모아보는 중 🤘<br><span onclick="toggleFilter('')" style="cursor: pointer; text-decoration: underline; display: inline-block; margin-top: 8px; color: #888;">전체 스케줄 보기</span>`;
      listContainer.appendChild(noticeDiv);
    }

    const filtered = currentFilter ? scheduleData.filter(d => d.typeStr === currentFilter) : scheduleData;
    filtered.forEach((item) => {
      const itemEl = document.createElement('div');
      itemEl.className = 'schedule-item';
      itemEl.onclick = () => openDetail(item.dateStr, item.titleStr, item.imgUrl, item.descStr);
      let badgeHtml = item.typeStr ? `<div class="category-badge ${currentFilter===item.typeStr?'active':''}" onclick="event.stopPropagation(); toggleFilter('${item.typeStr}')">${item.typeStr}</div>` : '';
      const isChecked = attendance[item.titleStr] ? 'checked' : '';
      const checkBtn = document.createElement('div');
      checkBtn.className = `check-btn ${isChecked}`;
      checkBtn.onclick = (e) => toggleAttendance(item.titleStr, e);
      itemEl.innerHTML = `<div class="date">${item.dateStr}</div>${badgeHtml}<div class="title">${item.titleStr}</div>`;
      itemEl.appendChild(checkBtn);
      listContainer.appendChild(itemEl);
    });

    sortSchedules(); 
    renderCalendar(currentYear, currentMonth); 
  }

  function toggleFilter(type) {
    currentFilter = (currentFilter === type) ? '' : type;
    renderList();
  }

  function sortSchedules() {
    const scheduleList = document.getElementById('schedule-list');
    const notice = scheduleList.querySelector('.filter-notice');
    const items = Array.from(scheduleList.querySelectorAll('.schedule-item'));
    const upcomingWrapper = document.createElement('div');
    const pastDetails = document.createElement('details');
    pastDetails.className = 'past-schedules';
    pastDetails.innerHTML = '<summary>▼ 지나간 스케줄 보기</summary>';
    const pastWrapper = document.createElement('div');
    pastDetails.appendChild(pastWrapper);
    const today = new Date(); today.setHours(0, 0, 0, 0);

    items.forEach(item => {
      const dateStr = item.querySelector('.date').innerText;
      const [m, d] = dateStr.split('/').map(n => parseInt(n));
      const itemDate = new Date(currentYear, m - 1, d);
      if(itemDate < today) pastWrapper.appendChild(item);
      else upcomingWrapper.appendChild(item);
    });

    scheduleList.innerHTML = '';
    if(notice) scheduleList.appendChild(notice);
    scheduleList.appendChild(upcomingWrapper);
    if(pastWrapper.children.length > 0) scheduleList.appendChild(pastDetails);
  }

  function renderCalendar(year, month) {
    const calGrid = document.getElementById('cal-grid');
    document.getElementById('cal-title').innerText = `${year}년 ${month}월`;
    calGrid.innerHTML = '';
    ['일','월','화','수','목','금','토'].forEach(d => calGrid.innerHTML += `<div class="cal-day-name">${d}</div>`);
    const firstDay = new Date(year, month - 1, 1).getDay();
    const lastDate = new Date(year, month, 0).getDate();
    const today = new Date(); today.setHours(0,0,0,0);
    for(let i=0; i<firstDay; i++) calGrid.innerHTML += `<div class="cal-day empty"></div>`;
    for(let d=1; d<=lastDate; d++) {
      const targetDateStr = `${String(month).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
      const cellDate = new Date(year, month - 1, d);
      const isToday = cellDate.getTime() === today.getTime();
      const bgColor = cellDate < today ? '#333' : '#cc0033'; 
      const dayEvents = scheduleData.filter(ev => ev.dateStr === targetDateStr && (!currentFilter || ev.typeStr === currentFilter));
      let eventHtml = '';
      dayEvents.forEach(ev => {
        const div = document.createElement('div');
        div.className = 'cal-event';
        div.style.backgroundColor = bgColor;
        div.innerText = ev.titleStr;
        div.onclick = (e) => { e.stopPropagation(); openDetail(ev.dateStr, ev.titleStr, ev.imgUrl, ev.descStr); };
        eventHtml += div.outerHTML;
      });
      const dayEl = document.createElement('div');
      dayEl.className = `cal-day ${isToday ? 'today' : ''}`;
      let todayBadge = isToday ? `<span class="today-label">TODAY</span>` : '';
      dayEl.innerHTML = `<span>${d}</span>${todayBadge}${eventHtml}`;
      dayEl.querySelectorAll('.cal-event').forEach((el, idx) => {
        el.onclick = (e) => { e.stopPropagation(); openDetail(dayEvents[idx].dateStr, dayEvents[idx].titleStr, dayEvents[idx].imgUrl, dayEvents[idx].descStr); };
      });
      calGrid.appendChild(dayEl);
    }
  }

  function prevMonth() { currentMonth--; if(currentMonth < 1) { currentMonth = 12; currentYear--; } renderCalendar(currentYear, currentMonth); }
  function nextMonth() { currentMonth++; if(currentMonth > 12) { currentMonth = 1; currentYear++; } renderCalendar(currentYear, currentMonth); }

  function openDetail(date, title, imageUrl, text) {
    document.getElementById('main-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    document.getElementById('view-date').innerText = date;
    document.getElementById('view-title').innerText = title;
    if(imageUrl && imageUrl.trim() !== '') {
      document.getElementById('view-image').innerHTML = `<img src="${imageUrl}" alt="포스터">`;
    } else {
      document.getElementById('view-image').innerHTML = '<div style="height: 350px; background: radial-gradient(circle, #2a2a2a 0%, #111 100%); width: 100%;"></div>';
    }
    let formattedText = String(text).replace(/\n/g, '<br>');
    if (!formattedText.includes('<a href')) {
      const urlRegex = /(https?:\/\/[^\s<>]+)/g;
      formattedText = formattedText.replace(urlRegex, url => `<a href="${url}" target="_blank">인스타그램 바로가기 ↗</a>`);
    }
    document.getElementById('view-text').innerHTML = formattedText;
    const [m, d] = date.split('/').map(n => n.padStart(2, '0'));
    const startDateTime = `${currentYear}${m}${d}T090000Z`;
    const endDateTime = `${currentYear}${m}${d}T100000Z`;
    const summary = `[DP] ${title}`;
    const description = text.replace(/\n/g, '\\n');
    const icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${startDateTime}\nDTEND:${endDateTime}\nSUMMARY:${summary}\nDESCRIPTION:${description}\nEND:VEVENT\nEND:VCALENDAR`;
    const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
    const calUrl = URL.createObjectURL(blob);
    document.getElementById('add-to-cal-btn-area').innerHTML = `<a href="${calUrl}" download="schedule.ics" class="add-cal-btn">🗓️ 아이폰 캘린더에 일정 추가하기</a>`;
    document.getElementById('detail-view').scrollTop = 0;
  }

  function closeDetail() {
    document.getElementById('detail-view').style.display = 'none';
    /* 💥 심복의 팩트 폭격 수정 지점: 'block'을 'flex'로 변경했쇼! */
    document.getElementById('main-view').style.display = 'flex';
  }

  window.onload = fetchSchedules;
</script>

</body>
</html>
