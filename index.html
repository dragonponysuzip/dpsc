<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DragonPony Schedule v2.7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: #000; height: 100vh; overflow: hidden; }
  .app-wrap { max-width: 480px; margin: 0 auto; background: #121212; color: #fff; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
  .view-content::-webkit-scrollbar { width: 0px; background: transparent; } 
  .view-content { -ms-overflow-style: none; scrollbar-width: none; flex-grow: 1; height: 0; overflow-y: auto; display: none; background: #121212; padding-bottom: 120px; }
  .view-content.active { display: block; }
  .header { background: #0a0a0a; color: #fff; padding: 25px 20px; text-align: center; border-bottom: 1px solid #222; flex-shrink: 0; }
  .main-title { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 2.0rem; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px rgba(204, 0, 51, 0.4); }
  .sub-title-link { font-size: 0.85rem; font-weight: 300; color: #888; text-decoration: none; }
  .tab-wrap { display: flex; border-bottom: 1px solid #222; flex-shrink: 0; background: #121212; }
  .tab-btn { flex: 1; padding: 15px 0; border: none; background: none; font-size: 0.95rem; font-weight: bold; color: #555; cursor: pointer; transition: 0.2s; }
  .tab-btn.active { color: #fff; border-bottom: 3px solid #cc0033; }
  .lyrics-page { padding: 20px; }
  .lyrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .lyrics-item { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.15); padding: 30px 10px; border-radius: 12px; text-align: center; cursor: pointer; font-weight: bold; color: #fff; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; }
  .list-page { padding: 10px 20px; }
  .schedule-item { display: flex; align-items: center; padding: 20px 10px; border-bottom: 1px solid #222; cursor: pointer; }
  .date { font-weight: bold; color: #cc0033; width: 65px; font-size: 1.1rem; flex-shrink: 0; }
  .category-badge { padding: 3px 6px; margin-right: 12px; font-size: 0.7rem; font-weight: 700; color: #cc0033; border: 1px solid #cc0033; border-radius: 4px; }
  .title { font-size: 1.1rem; font-weight: 500; color: #eee; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .check-btn { width: 22px; height: 22px; border: 2px solid #444; border-radius: 50%; margin-left: 10px; flex-shrink: 0; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; cursor: pointer; }
  .check-btn.checked { background: #cc0033; border-color: #cc0033; color: #fff; }
  .check-btn.checked::after { content: '✓'; }
  .past-schedules { margin-top: 20px; border-top: 2px dashed #333; padding-top: 15px; }
  .past-schedules summary { cursor: pointer; font-size: 0.95rem; color: #888; font-weight: bold; list-style: none; text-align: center; padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; }
  .data-mgmt { margin: 40px 10px 100px 10px; padding: 20px; border: 1px solid #222; border-radius: 12px; background: #0a0a0a; text-align: center; }
  .data-btn { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #333; color: #888; border-radius: 6px; cursor: pointer; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 15px; }
  .cal-day { min-height: 70px; border: 1px solid #222; border-radius: 5px; padding: 4px 2px; font-size: 0.9rem; }
  .cal-day.today { border: 2px solid #cc0033; }
  .cal-event { margin-top: 2px; color: #fff; font-size: 0.65rem; padding: 4px 2px; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; }
  .detail-page, .lyrics-detail { display: none; background: #121212; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; overflow-y: auto; color: #fff; }
  .floating-back-btn { position: fixed; top: 20px; left: 15px; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.8); color: #fff; border: 1px solid rgba(255,255,255,0.2); z-index: 1100; display: flex; align-items: center; justify-content: center; }
  .lyrics-title { font-size: 2.2rem; font-weight: 900; color: #cc0033; margin: 80px 0 30px; text-align: center; }
  .lyrics-content { line-height: 2.2; font-size: 1.05rem; text-align: center; color: #bbb; white-space: pre-line; padding: 0 20px 100px; }
  .footer { padding: 15px; text-align: center; border-top: 1px solid #222; flex-shrink: 0; }
</style>
</head>
<body>
<div class="app-wrap">
  <div id="main-view" style="display: flex; flex-direction: column; height: 100%;">
    <div class="header">
      <span class="main-title">DRAGON PONY SCHEDULE</span>
      <a href="https://www.instagram.com/dragonpony_/" target="_blank" class="sub-title-link">@dragonpony_</a>
    </div>
    <div class="tab-wrap">
      <button class="tab-btn active" onclick="switchTab('calendar')" id="btn-calendar">월간 스케줄</button>
      <button class="tab-btn" onclick="switchTab('list')" id="btn-list">목록 보기</button>
      <button class="tab-btn" onclick="switchTab('lyrics')" id="btn-lyrics">미발매곡 가사</button>
    </div>
    <div id="calendar-view" class="view-content active"><div class="cal-header" style="text-align:center; padding:15px;"><button onclick="prevMonth()">◀</button> <span id="cal-title"></span> <button onclick="nextMonth()">▶</button></div><div class="cal-grid" id="cal-grid"></div></div>
    <div id="list-view" class="view-content"><div id="schedule-list" class="list-page"></div><div class="data-mgmt"><div class="data-mgmt-title">BACKUP</div><button class="data-btn" onclick="exportData()">기록 내보내기</button><button class="data-btn" onclick="importData()">기록 가져오기</button></div></div>
    <div id="lyrics-view" class="view-content"><div class="lyrics-page"><div class="lyrics-grid" id="lyrics-grid"></div></div></div>
    <div class="footer"><a href="#" class="sub-title-link">@dragonponysuzip</a></div>
  </div>
  <div class="detail-page" id="detail-view">
    <button class="floating-back-btn" onclick="closeDetail()">◀</button>
    <div id="view-image" style="width:100%; min-height:300px; background:#1a1a1a;"></div>
    <div id="view-date" style="color:#cc0033; font-weight:900; padding:20px 20px 5px;"></div>
    <div id="view-title" style="font-size:2rem; font-weight:900; padding:0 20px 20px;"></div>
    <div id="view-text" style="padding:20px; line-height:1.8; color:#ddd;"></div>
  </div>
  <div class="lyrics-detail" id="lyrics-detail-view">
    <button class="floating-back-btn" onclick="closeLyrics()">◀</button>
    <div class="lyrics-title" id="l-title"></div>
    <div class="lyrics-content" id="l-content"></div>
  </div>
</div>
<script>
  let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth() + 1;
  let scheduleData = [], lyricsData = [];
  
  function getAttendance() { const s = localStorage.getItem('dp_attendance'); return s ? JSON.parse(s) : {}; }
  function switchTab(t) { document.querySelectorAll('.tab-btn, .view-content').forEach(e => e.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); document.getElementById(t+'-view').classList.add('active'); }

  // [메시지 커스텀 적용]
  function exportData() {
    const d = localStorage.getItem('dp_attendance');
    if(!d || d === '{}') return alert("내보낼 기록이 없세혁!");
    navigator.clipboard.writeText(btoa(encodeURIComponent(d))).then(() => alert("체크 기록이 복사되었어요!\n메모장이나 카톡에 붙여넣어 보관하세혁♡,,♡"));
  }
  function importData() {
    const c = prompt("복사해둔 백업 코드를 입력해주세혁:");
    if(!c) return;
    try { localStorage.setItem('dp_attendance', decodeURIComponent(atob(c))); alert("기록 복구 성공! 🎸"); location.reload(); }
    catch(e) { alert("잘못된 코드인 것 같아요. 다시 확인해주세혁ㅠ..ㅠ!"); }
  }

  // [시트 연동 로직]
  async function fetchData() {
    const sheetSched = '1UKMplA90Fz4x3ueJtjRSOGOK1bD1c74GkK-wo573dG4';
    const sheetLyrics = '1zfCSs8P8qEtDaWQlYFaCb7f1-roga3uyGLeWGDtUfME';
    
    // 스케줄 가져오기
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetSched}/gviz/tq?tqx=out:json`);
      const txt = await res.text();
      const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
      scheduleData = json.table.rows.filter(r => r.c[0] && r.c[0].v !== '날짜').map(r => ({
        dateStr: r.c[0].v, titleStr: r.c[1]?.v || '', imgUrl: r.c[2]?.v || '', descStr: r.c[3]?.v || '', typeStr: r.c[4]?.v || ''
      }));
      renderCalendar(currentYear, currentMonth); renderList();
    } catch(e) { console.error("Sched Fail", e); }

    // 가사 가져오기 (지은 누님이 새로 주신 시트!)
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${sheetLyrics}/gviz/tq?tqx=out:json`);
      const txt = await res.text();
      const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
      lyricsData = json.table.rows.filter(r => r.c[0] && r.c[0].v !== '곡제목').map(r => ({
        title: r.c[0].v, content: r.c[1]?.v || ''
      }));
      renderLyrics();
    } catch(e) { console.error("Lyrics Fail", e); }
  }

  function renderLyrics() {
    const g = document.getElementById('lyrics-grid'); g.innerHTML = '';
    lyricsData.forEach(s => {
      const d = document.createElement('div'); d.className = 'lyrics-item'; d.innerText = s.title;
      d.onclick = () => { 
        document.getElementById('l-title').innerText = s.title; 
        document.getElementById('l-content').innerText = s.content;
        document.getElementById('lyrics-detail-view').style.display = 'block';
        document.getElementById('main-view').style.display = 'none';
      };
      g.appendChild(d);
    });
  }

  // [스케줄 리스트/달력 렌더링 - v2.6 로직 유지]
  function renderList() {
    const list = document.getElementById('schedule-list'); list.innerHTML = '';
    const att = getAttendance(); const today = new Date(); today.setHours(0,0,0,0);
    const upWrap = document.createElement('div'), pastDet = document.createElement('details');
    pastDet.className = 'past-schedules'; pastDet.innerHTML = '<summary>▼ 지나간 스케줄 보기</summary>';
    const pastWrap = document.createElement('div'); pastDet.appendChild(pastWrap);

    scheduleData.forEach(item => {
      const p = item.dateStr.split('-')[0].split('/');
      const itemD = new Date(currentYear, p[0]-1, p[1]);
      const div = document.createElement('div'); div.className = 'schedule-item';
      div.onclick = () => openDetail(item.dateStr, item.titleStr, item.imgUrl, item.descStr);
      div.innerHTML = `<div class="date">${item.dateStr}</div><div class="category-badge">${item.typeStr || 'ETC'}</div><div class="title">${item.titleStr}</div>`;
      const btn = document.createElement('div'); btn.className = 'check-btn ' + (att[item.titleStr] ? 'checked' : '');
      btn.onclick = (e) => { e.stopPropagation(); att[item.titleStr] = !att[item.titleStr]; localStorage.setItem('dp_attendance', JSON.stringify(att)); renderList(); };
      div.appendChild(btn);
      if(itemD >= today) upWrap.appendChild(div); else pastWrap.appendChild(div);
    });
    list.appendChild(upWrap); if(pastWrap.children.length > 0) list.appendChild(pastDet);
  }

  function renderCalendar(y, m) {
    const g = document.getElementById('cal-grid'); g.innerHTML = '';
    document.getElementById('cal-title').innerText = `${y}년 ${m}월`;
    const last = new Date(y, m, 0).getDate(), first = new Date(y, m-1, 1).getDay();
    const today = new Date(); today.setHours(0,0,0,0);
    for(let i=0; i<first; i++) g.innerHTML += '<div></div>';
    for(let d=1; d<=last; d++) {
      const cell = new Date(y, m-1, d);
      const evs = scheduleData.filter(ev => {
        const p = ev.dateStr.split('-');
        const s = p[0].split('/'); if(parseInt(s[0])===m && parseInt(s[1])===d) return true;
        if(p[1]) {
          const e = p[1].split('/');
          const start = new Date(y, s[0]-1, s[1]).getTime(), end = e.length===1 ? new Date(y, s[0]-1, e[0]).getTime() : new Date(y, e[0]-1, e[1]).getTime();
          return cell.getTime() >= start && cell.getTime() <= end;
        }
        return false;
      });
      const dayEl = document.createElement('div'); dayEl.className = 'cal-day' + (cell.getTime()===today.getTime()?' today':'');
      let evHtml = ''; evs.forEach(ev => evHtml += `<div class="cal-event" style="background:${cell < today ? '#333' : '#cc0033'}" onclick="event.stopPropagation(); openDetail('${ev.dateStr}','${ev.titleStr}','${ev.imgUrl}','${ev.descStr}')">${ev.titleStr}</div>`);
      dayEl.innerHTML = `<span>${d}</span>` + evHtml; g.appendChild(dayEl);
    }
  }

  function prevMonth() { currentMonth--; if(currentMonth < 1) { currentMonth=12; currentYear--; } renderCalendar(currentYear, currentMonth); }
  function nextMonth() { currentMonth++; if(currentMonth > 12) { currentMonth=1; currentYear++; } renderCalendar(currentYear, currentMonth); }
  function openDetail(d, t, i, x) { document.getElementById('main-view').style.display='none'; document.getElementById('detail-view').style.display='block'; document.getElementById('view-date').innerText=d; document.getElementById('view-title').innerText=t; document.getElementById('view-image').innerHTML=i?`<img src="${i}" style="width:100%">`:''; document.getElementById('view-text').innerText=x; }
  function closeDetail() { document.getElementById('detail-view').style.display='none'; document.getElementById('main-view').style.display='flex'; }
  function closeLyrics() { document.getElementById('lyrics-detail-view').style.display='none'; document.getElementById('main-view').style.display='flex'; }

  window.onload = fetchData;
</script>
</body>
</html>
