<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DragonPony Schedule v2.3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  /* [BASE STYLE] */
  body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: #000; height: 100vh; overflow: hidden; }
  .app-wrap { max-width: 480px; margin: 0 auto; background: #121212; color: #fff; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
  
  .header { background: #0a0a0a; color: #fff; padding: 25px 20px; text-align: center; border-bottom: 1px solid #222; flex-shrink: 0; }
  .main-title { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 2.0rem; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px rgba(204, 0, 51, 0.4); }
  .sub-title-link { font-size: 0.85rem; font-weight: 300; color: #888; text-decoration: none; letter-spacing: 0.5px; }

  /* [TAB SYSTEM] */
  .tab-wrap { display: flex; border-bottom: 1px solid #222; flex-shrink: 0; background: #121212; }
  .tab-btn { flex: 1; padding: 15px 0; border: none; background: none; font-size: 0.95rem; font-weight: bold; color: #555; cursor: pointer; transition: 0.2s; }
  .tab-btn.active { color: #fff; border-bottom: 3px solid #cc0033; }
  
  .view-content { flex-grow: 1; height: 0; overflow-y: auto; display: none; background: #121212; padding-bottom: 120px; }
  .view-content.active { display: block; }

  /* [LYRICS TAB STYLE] */
  .lyrics-page { padding: 20px; }
  .lyrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .lyrics-item { 
    background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 30px 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s;
    display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; font-size: 1.05rem;
  }
  .lyrics-item:active { transform: scale(0.93); background: rgba(204, 0, 51, 0.3); border-color: #cc0033; }

  /* [SCHEDULE LIST STYLE] */
  .list-page { padding: 10px 20px; }
  .schedule-item { display: flex; align-items: center; padding: 20px 10px; border-bottom: 1px solid #222; cursor: pointer; }
  .date { font-weight: bold; color: #cc0033; width: 65px; font-size: 1.1rem; flex-shrink: 0; }
  .category-badge { padding: 3px 6px; margin-right: 12px; font-size: 0.7rem; font-weight: 700; color: #cc0033; border: 1px solid #cc0033; border-radius: 4px; }
  .title { font-size: 1.1rem; font-weight: 500; color: #eee; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* [CALENDAR STYLE] */
  .calendar-wrap { padding: 15px; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; font-size: 1.2rem; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
  .cal-day { min-height: 70px; border: 1px solid #222; border-radius: 5px; padding: 4px 2px; font-size: 0.9rem; display: flex; flex-direction: column; position: relative; }
  .cal-day.today { border: 2px solid #cc0033; background: rgba(204, 0, 51, 0.1); }
  .cal-event { margin-top: auto; color: #fff; font-size: 0.65rem; padding: 4px 2px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }

  /* [PAGES] */
  .detail-page, .lyrics-detail { display: none; background: #121212; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; overflow-y: auto; color: #fff; }
  .floating-back-btn { position: fixed; top: 20px; left: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.8); color: #fff; border: 1px solid rgba(255,255,255,0.2); z-index: 1100; display: flex; align-items: center; justify-content: center; cursor: pointer; }

  .lyrics-title { font-size: 2.2rem; font-weight: 900; color: #cc0033; margin: 80px 0 30px; text-align: center; }
  .lyrics-content { line-height: 2.2; font-size: 1.05rem; text-align: center; color: #bbb; white-space: pre-line; padding: 0 20px 100px; }
  
  .hero-section { position: relative; width: 100%; min-height: 350px; background: #1a1a1a; }
  .d-image img { width: 100%; display: block; object-fit: cover; min-height: 350px; }
  .hero-title-area { position: absolute; bottom: 30px; left: 20px; right: 20px; z-index: 2; }
  .d-date { color: #cc0033; font-weight: 900; font-size: 1.4rem; }
  .d-title { font-size: 2.2rem; font-weight: 900; line-height: 1.2; }
  .ticket-section { padding: 20px; padding-bottom: 120px; }
  .ticket-wrapper { background: #1a1a1a; border: 2px dashed #444; border-radius: 12px; padding: 35px 20px 25px; position: relative; }
  .ticket-label { position: absolute; top: -14px; left: 20px; background: #cc0033; color: #fff; font-size: 0.8rem; font-weight: 900; padding: 6px 15px; border-radius: 4px; }
  .add-cal-btn { display: block; width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #eee; border-radius: 8px; font-weight: bold; text-align: center; text-decoration: none; margin-top: 20px; }

  .footer { padding: 15px; text-align: center; border-top: 1px solid #222; flex-shrink: 0; }
  .insta-footer-link { font-size: 0.85rem; color: #777; text-decoration: none; }
</style>
</head>
<body>

<div class="app-wrap">

    </div>

      <button class="tab-btn" id="btn-lyrics" onclick="switchTab('lyrics')">미발매곡 가사</button>

    <div id="calendar-view" class="view-content active">

      </div>

    <div id="list-view" class="view-content">

    <div class="footer">

    </div>
  </div>

  <div class="detail-page" id="detail-view">

    <div class="hero-section">
      <div id="view-image" class="d-image"></div>
      <div class="hero-title-area">
        <div class="d-date" id="view-date"></div>
        <div class="d-title" id="view-title"></div>
      </div>
    </div>
    <div class="ticket-section">
      <div class="ticket-wrapper">
        <div class="ticket-label">INFO</div>
        <div id="view-text" style="white-space:pre-line; line-height:1.8;"></div>
      </div>
      <div id="add-to-cal-btn-area"></div>
    </div>
  </div>

  <div class="lyrics-detail" id="lyrics-detail-view">
    <button class="floating-back-btn" onclick="closeLyrics()">◀</button>
    <div class="lyrics-title" id="l-title"></div>
    <div class="lyrics-content" id="l-content"></div>
  </div>
</div>
