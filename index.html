<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DragonPony Schedule v2.1</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  /* [기존 스타일 유지쇼] */
  body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: #000; height: 100vh; overflow: hidden; }
  .app-wrap { max-width: 480px; margin: 0 auto; background: #121212; color: #fff; height: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; }
  .header { background: #0a0a0a; color: #fff; padding: 25px 20px; text-align: center; border-bottom: 1px solid #222; }
  .main-title { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 2.0rem; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px rgba(204, 0, 51, 0.4); }
  
  .tab-wrap { display: flex; border-bottom: 1px solid #222; background: #121212; }
  .tab-btn { flex: 1; padding: 15px 0; border: none; background: none; font-size: 0.9rem; font-weight: bold; color: #555; cursor: pointer; transition: 0.2s; }
  .tab-btn.active { color: #fff; border-bottom: 3px solid #cc0033; }
  
  .view-content { flex-grow: 1; height: 0; overflow-y: auto; display: none; background: #121212; padding-bottom: 100px; }
  .view-content.active { display: block; }

  /* [미발매곡 가사 탭 전용 스타일 - 환하게 수정!] */
  .lyrics-page { padding: 20px; }
  .lyrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .lyrics-item { 
    /* 💥 심복의 팩트 폭격 수정 지점: rgba(255, 255, 255, 0.15) 로 변경했쇼!! */
    background: rgba(255, 255, 255, 0.15); /* ㅈㄴ게 환해진 불투명 박스쇼!! ㅋㅋㅋ */
    border: 1px solid rgba(255, 255, 255, 0.2); /* 보더도 살짝 밝게 했쇼!! ㅋㅋㅋ */
    padding: 30px 15px; /* 박스 볼륨감 좀 더 줬쇼!! ㅋㅋㅋ */
    border-radius: 12px; 
    text-align: center; 
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #fff; /* 글자색은 완전 하얗게!! ㅋㅋㅋ */
    font-size: 1.05rem;
    box-shadow: 0 6px 15px rgba(255,255,255,0.03); /* 밝은 그림자 살짝!! ㅋㅋㅋ */
  }
  /* [버튼 누르는 느낌 유지 - ㅈㄴ게 짜릿하게!] */
  .lyrics-item:active { transform: scale(0.93); background: rgba(204, 0, 51, 0.3); border-color: #cc0033; box-shadow: 0 0 10px rgba(204, 0, 51, 0.5); }

  /* [가사 상세 페이지 전용] */
  .lyrics-detail { 
    display: none; background: #121212; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    z-index: 20; color: #fff; padding: 80px 25px 40px; box-sizing: border-box; overflow-y: auto;
  }
  .lyrics-content { line-height: 2.2; font-size: 1.05rem; text-align: center; color: #bbb; white-space: pre-line; }
  .lyrics-title { font-size: 2.2rem; font-weight: 900; color: #cc0033; margin-bottom: 30px; text-align: center; }
  .floating-back-btn { position: fixed; top: 20px; left: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.2); z-index: 100; cursor: pointer; }
</style>
</head>
<body>

<div class="app-wrap">
  <div id="main-view" style="display: flex; flex-direction: column; height: 100%;">
    <div class="header">
      <span class="main-title">DRAGON PONY ARCHIVE</span>
    </div>

    <div class="tab-wrap">
      <button class="tab-btn active" id="btn-calendar" onclick="switchTab('calendar')">월간 스케줄</button>
      <button class="tab-btn" id="btn-list" onclick="switchTab('list')">목록 보기</button>
      <button class="tab-btn" id="btn-lyrics" onclick="switchTab('lyrics')">미발매곡 가사</button>
    </div>

    <div id="calendar-view" class="view-content active"><div id="cal-grid" class="cal-grid"></div></div>
    <div id="list-view" class="view-content"><div id="schedule-list" class="list-page"></div></div>

    <div id="lyrics-view" class="view-content">
      <div class="lyrics-page">
        <div class="lyrics-grid" id="lyrics-grid">
          </div>
      </div>
    </div>
  </div>

  <div class="lyrics-detail" id="lyrics-detail-view">
    <button class="floating-back-btn" onclick="closeLyrics()">◀</button>
    <div class="lyrics-title" id="l-title">곡 제목</div>
    <div class="lyrics-content" id="l-content">가사 데이터</div>
  </div>
</div>

<script>
  // [기존 스케줄/가사 데이터 및 함수들 유지...]
  const unreleasedLyrics = [ { title: "NOT OUT", content: `(가사...)` }, { title: "NEVER", content: `(가사...)` }, { title: "DENEB", content: `(가사...)` }, { title: "Morse Code", content: `(가사...)` } ];
  function switchTab(tab) { document.querySelectorAll('.tab-btn, .view-content').forEach(el => el.classList.remove('active')); document.getElementById(`btn-${tab}`).classList.add('active'); document.getElementById(`${tab}-view`).classList.add('active'); if(tab === 'lyrics') renderLyrics(); }
  function renderLyrics() { const grid = document.getElementById('lyrics-grid'); grid.innerHTML = ''; unreleasedLyrics.forEach(song => { const item = document.createElement('div'); item.className = 'lyrics-item'; item.innerText = song.title; item.onclick = () => openLyrics(song.title, song.content); grid.appendChild(item); }); }
  function openLyrics(title, content) { document.getElementById('l-title').innerText = title; document.getElementById('l-content').innerText = content; document.getElementById('lyrics-detail-view').style.display = 'block'; document.getElementById('main-view').style.display = 'none'; }
  function closeLyrics() { document.getElementById('lyrics-detail-view').style.display = 'none'; document.getElementById('main-view').style.display = 'flex'; }
  
  // [기존 캘린더/리스트 JS는 여기에...]
  window.onload = () => { renderLyrics(); };
</script>

</body>
</html>
